# Production: backend only. Settings from .env or host env; defaults from .env.example.
# Usage: copy .env.example to .env, edit, then: docker compose -f docker-compose.prod.yml up -d
# Or: export vars and run; Compose substitutes ${VAR} from .env or shell.

services:
  olo-backend:
    image: olo:latest
    # Or use your registry: image: ghcr.io/myorg/olo:latest
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    env_file:
      - .env.example
    ports:
      - "7080:7080"
    environment:
      SERVER_PORT: "7080"
      OLO_CACHE_HOST: ${OLO_CACHE_HOST:-redis}
      OLO_CACHE_PORT: ${OLO_CACHE_PORT:-6379}
      OLO_CACHE_DATABASE: ${OLO_CACHE_DATABASE:-0}
      OLO_TEMPORAL_TARGET: ${OLO_TEMPORAL_TARGET:-temporal:7233}
      OLO_TEMPORAL_NAMESPACE: ${OLO_TEMPORAL_NAMESPACE:-default}
      OLO_TEMPORAL_TASK_QUEUE: ${OLO_TEMPORAL_TASK_QUEUE:-olo-chat}
      OLO_CHAT_CALLBACK_BASE_URL: ${OLO_CHAT_CALLBACK_BASE_URL:-http://localhost:7080}
      OLO_WS_JWT_REQUIRED: ${OLO_WS_JWT_REQUIRED:-true}
      OLO_DEFAULT_TENANT_ID: ${OLO_DEFAULT_TENANT_ID:-2a2a91fb-f5b4-4cf0-b917-524d242b2e3d}
      OLO_SWAGGER_UI_ENABLED: ${OLO_SWAGGER_UI_ENABLED:-false}
    restart: unless-stopped
    # Optional: add a healthcheck if your image has wget/curl (e.g. custom Dockerfile)
    # healthcheck:
    #   test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:7080/api/health"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 40s
