plugins {
    id 'java-library'
    id 'maven-publish'
}

group = 'com.olo'
version = '0.0.1-SNAPSHOT'

java {
    sourceCompatibility = JavaVersion.VERSION_21
    targetCompatibility = JavaVersion.VERSION_21
}

repositories {
    mavenCentral()
}

dependencies {
    api 'io.temporal:temporal-sdk:1.26.0'
}

publishing {
    publications {
        maven(MavenPublication) {
            from components.java
            groupId = 'com.olo'
            artifactId = 'olo-sdk'
            version = project.version
        }
    }
}

tasks.named('test') {
    useJUnitPlatform()
}
