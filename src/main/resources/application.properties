# =============================================================================
# Default configuration. All properties can be overridden by environment variables.
# Spring Boot relaxed binding: server.port → SERVER_PORT, olo.chat.callback-base-url → OLO_CHAT_CALLBACK_BASE_URL.
# Use .env or .env.example (copy to .env) for local/docker overrides; see repo root .env.example.
# =============================================================================

spring.application.name=olo-backend
server.port=7080

# Swagger UI. Override: OLO_SWAGGER_UI_ENABLED (true/false). Set false in production to hide docs.
olo.swagger-ui.enabled=true
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=${olo.swagger-ui.enabled:true}

# Chat BE → worker callback (worker POSTs events here). Override: OLO_CHAT_CALLBACK_BASE_URL
olo.chat.callback-base-url=http://localhost:7080
# Override: OLO_TEMPORAL_TASK_QUEUE, OLO_TEMPORAL_TARGET, OLO_TEMPORAL_NAMESPACE, OLO_WORKFLOW_TYPE
olo.temporal.task-queue=olo-chat
olo.temporal.target=localhost:7233
olo.temporal.workflow-type=OloKernelWorkflow

# Request logging (INFO shows all REQUEST lines from RequestLoggingFilter)
logging.level.com.olo.app.filter.RequestLoggingFilter=INFO
# Queues from Redis: set to DEBUG to see keysFound and pattern results
logging.level.com.olo.app.service.KernelConfigQueueService=DEBUG
logging.level.com.olo.app.controller.TenantQueuesController=WARN

# WebSocket. Override: OLO_WS_JWT_REQUIRED. Default tenant (WebSocket + UI) from OLO_DEFAULT_TENANT_ID.
olo.ws.jwt.required=false

# Default tenant (WebSocket when JWT bypassed, and UI dropdown). Override: OLO_DEFAULT_TENANT_ID, OLO_TENANT_IDS
olo.default-tenant-id=2a2a91fb-f5b4-4cf0-b917-524d242b2e3d
olo.tenant-ids=

# Cache (Redis). Override: OLO_CACHE_HOST, OLO_CACHE_PORT, OLO_CACHE_DATABASE
olo.cache.host=localhost
olo.cache.port=6379
olo.cache.database=0
spring.data.redis.host=${olo.cache.host:localhost}
spring.data.redis.port=${olo.cache.port:6379}
spring.data.redis.database=${olo.cache.database:0}
# Only if you want to run without Redis (queues endpoint will return []): uncomment the next line.
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

