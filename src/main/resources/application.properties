spring.application.name=olo-backend
server.port=7080

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Chat BE → worker callback (worker POSTs events here)
olo.chat.callback-base-url=http://localhost:7080
olo.temporal.task-queue=olo-chat
olo.temporal.target=localhost:7233
# Workflow type. Overridden by env OLO_WORKFLOW_TYPE when set.
olo.temporal.workflow-type=OloKernelWorkflow

# Request logging (INFO shows all REQUEST lines from RequestLoggingFilter)
logging.level.com.olo.app.filter.RequestLoggingFilter=INFO
# Queues from Redis: set to DEBUG to see keysFound and pattern results
logging.level.com.olo.app.service.KernelConfigQueueService=DEBUG
logging.level.com.olo.app.controller.TenantQueuesController=WARN

# WebSocket: when false, handshake without JWT is allowed and tenantId defaults to olo.ws.default-tenant (for Swagger/local testing)
olo.ws.jwt.required=false
# Default tenant ID; always available when JWT is bypassed. Use this tenantId in Swagger (sessions/runs) to match WebSocket default.
olo.ws.default-tenant=2a2a91fb-f5b4-4cf0-b917-524d242b2e3d

# Tenant list for UI dropdown. Default tenant id returned as first entry with name "Default". Env OLO_DEFAULT_TENANT_ID overrides.
olo.default-tenant-id=2a2a91fb-f5b4-4cf0-b917-524d242b2e3d
# Additional tenant ids (comma-separated); merged with Redis-discovered ids. "default" is treated as olo.default-tenant-id.
olo.tenant-ids=

# Redis (for kernel config queues: <tenantId>:olo:kernel:config:*). Required for /api/tenants/{id}/queues to return the list.
# 1) Start Redis (e.g. redis-server) on the host/port below.
# 2) Do NOT uncomment the exclude line below, or the queues endpoint will always return [].
spring.data.redis.host=localhost
spring.data.redis.port=6379
# Redis database index (default 0). If your keys are in another DB, set spring.data.redis.database=1
spring.data.redis.database=0
# Only if you want to run without Redis (queues endpoint will return []): uncomment the next line.
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

