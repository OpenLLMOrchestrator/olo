spring.application.name=olo-backend
server.port=7080

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Chat BE → worker callback (worker POSTs events here)
olo.chat.callback-base-url=http://localhost:7080
olo.temporal.task-queue=olo-chat
olo.temporal.target=localhost:7233
# Workflow type. Overridden by env OLO_WORKFLOW_TYPE when set.
olo.temporal.workflow-type=OloKernelWorkflow

# Request logging (INFO shows all REQUEST lines from RequestLoggingFilter)
logging.level.com.olo.app.filter.RequestLoggingFilter=INFO

