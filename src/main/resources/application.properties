spring.application.name=olo-backend
server.port=7080

# Swagger UI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Chat BE → worker callback (worker POSTs events here)
olo.chat.callback-base-url=http://localhost:7080
olo.temporal.task-queue=olo-chat
olo.temporal.target=localhost:7233
# Workflow type. Overridden by env OLO_WORKFLOW_TYPE when set.
olo.temporal.workflow-type=OloKernelWorkflow

# Request logging (INFO shows all REQUEST lines from RequestLoggingFilter)
logging.level.com.olo.app.filter.RequestLoggingFilter=INFO

# WebSocket: when false, handshake without JWT is allowed and tenantId defaults to olo.ws.default-tenant (for Swagger/local testing)
olo.ws.jwt.required=false
# Default tenant ID; always available when JWT is bypassed. Use this tenantId in Swagger (sessions/runs) to match WebSocket default.
olo.ws.default-tenant=2a2a91fb-f5b4-4cf0-b917-524d242b2e3d

