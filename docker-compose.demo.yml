# Demo: one-command stack (backend + Redis + Temporal). Run worker/executor on host.
# Usage: docker compose -f docker-compose.demo.yml up -d
# Then: run executor on host (see docs/DOCKER_COMPOSE.md). Swagger: http://localhost:7080/swagger-ui.html

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 3s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.24.2
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgres
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "workflow", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  olo-backend:
    image: olo:demo
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    ports:
      - "7080:7080"
    environment:
      SERVER_PORT: "7080"
      OLO_CACHE_HOST: redis
      OLO_CACHE_PORT: "6379"
      OLO_CACHE_DATABASE: "0"
      OLO_TEMPORAL_TARGET: temporal:7233
      OLO_TEMPORAL_NAMESPACE: default
      OLO_TEMPORAL_TASK_QUEUE: olo-chat
      OLO_CHAT_CALLBACK_BASE_URL: "http://localhost:7080"
      OLO_WS_JWT_REQUIRED: "false"
      OLO_DEFAULT_TENANT_ID: "2a2a91fb-f5b4-4cf0-b917-524d242b2e3d"
    depends_on:
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
